name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código do repositório
      - name: Checkout code
        uses: actions/checkout@v2

      # Instalar dependências (caso necessário)
      - name: Install dependencies
        run: npm install  # ou outro comando, dependendo do seu projeto

      # Construir o projeto (caso necessário)
      - name: Build project
        run: npm run build  # ou outro comando de build

      # Login no Azure
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}  # Variável de ambiente com credenciais do Azure

      # Deploy no Azure
      - name: Azure Static Web Apps Deploy
        id: azure-static-web-app-deploy
        uses: azure/static-web-apps-deploy@v0
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_API_TOKEN }}  # Token de autenticação do Azure
          app_location: '/'  # Caminho do seu app (normalmente a raiz do repositório)
          api_location: 'api'  # Caso tenha uma API, caso contrário pode ser removido
          output_location: 'build'  # Pasta de saída do build, se houver

        # Condicional de deploy com base no branch
        env:
          AZURE_STATIC_WEB_APP_NAME: ${{ github.ref == 'refs/heads/develop' && 'meu-develop-gerconf' || 'meu-main-gerconf' }}
