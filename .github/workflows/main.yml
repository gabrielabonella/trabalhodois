name: Workflow para o branch main

on:
  schedule:
    - cron: '0 21 * * *'  # Rodar todos os dias às 21:00 (UTC)
  push:
    branches:
      - main  # Executa o workflow para qualquer push para a branch 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código do repositório
      - name: Checkout code
        uses: actions/checkout@v2

      # 5. Atualização do arquivo index.html
      - name: Update index.html
        run: |
          sed -i 's/old-text/new-text/g' path/to/index.html  # Exemplo de alteração no arquivo

      # 6. Login no Azure utilizando as credenciais armazenadas no GitHub Secrets
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      # 7. Deploy no Azure Static Web Apps
      - name: Deploy to Azure Static Web App
        id: azure-static-web-app-deploy
        uses: azure/static-web-apps-deploy@v0
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_API_TOKEN }}
          app_location: '/'  # Altere conforme a localização do seu código
          output_location: 'build'  # Pasta com o conteúdo final para deploy, normalmente 'build' ou 'dist'

      # 8. Rodar as migrações no banco de dados Supabase (para o ambiente 'main')
      - name: Run database migrations on Supabase for main
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL_MAIN }}  # Usando o secret do banco de dados
        run: |
          echo "Rodando migrações para o banco de dados Supabase (produção)..."
          # Usamos psql para rodar as migrações no banco de dados de produção
          psql $DATABASE_URL -f migrations/main.sql
