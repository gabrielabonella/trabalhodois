name: Workflow para o branch main

on:
  schedule:
    - cron: '0 21 * * *' 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout code
        uses: actions/checkout@v2

    
      - name: Update index.html
        run: |
         

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

   
      - name: Deploy to Azure Static Web App
        id: azure-static-web-app-deploy
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_API_TOKEN }}
          app_location: '/'  # Altere conforme a localização do seu código
          output_location: 'build'  # Pasta com o conteúdo final para deploy, normalmente 'build' ou 'dist'

   
      - name: Run database migrations on Supabase for main
